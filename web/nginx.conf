server {
    # Unprivileged port: the container runs nginx as the non-root `nginx`
    # user, which cannot bind the privileged port 80. Host port mapping
    # (e.g. 8084:8080 in docker-compose) keeps the external surface unchanged.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CORS is handled here at the proxy layer so the Go server does not need
    # to set Access-Control-* headers itself (keep both for now; removing the
    # Go-side CORS middleware is a follow-up once the proxy is confirmed in prod).
    set $cors_origin "*";

    # Serve static SPA assets. The try_files fallback routes any path that
    # doesn't match a real file back to index.html so client-side routing works
    # behind a reverse proxy at a sub-path (e.g. /huginn/).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Cache immutable Vite hashed assets aggressively.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Proxy all /api/* and /healthz requests to the Huginn Go backend.
    # HUGINN_UPSTREAM defaults to huginn:8081 (docker-compose service name).
    location ~ ^/(api|healthz|readyz|version)(/|$) {
        proxy_pass http://${HUGINN_UPSTREAM};
        proxy_http_version 1.1;

        # Required for SSE (/api/stream) — disable buffering so events arrive
        # in real time.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS headers for API responses.
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            return 204;
        }
    }
}
