version: '3.8'

services:
  huginn:
    build: .
    ports:
      - "8083:8081"
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - DATABASE_ENABLED=false
      - DATABASE_URL=postgres://postgres:postgres@db:5432/huginn?sslmode=disable
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
    depends_on:
      - redpanda
      - db

  dashboard:
    build:
      context: ./web
    ports:
      - "8084:80"
    depends_on:
      - huginn

  sleipnir:
    build:
      context: ../sleipnir
      dockerfile: Dockerfile
    ports:
      - "8086:8080"
    depends_on:
      - redpanda
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - KAFKA_INTENTS_TOPIC=executions.intents.v1
      - KAFKA_FILLS_TOPIC=executions.fills.v1
      - KAFKA_CONSUMER_GROUP=sleipnir-gateway
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_REST_URL=https://testnet.binance.vision
      - BINANCE_WS_URL=wss://ws-api.testnet.binance.vision/ws-api/v3
      - RATE_LIMIT_RPS=10.0
      - PORT=8080
      - DB_PATH=/app/data/sleipnir.db
    volumes:
      - sleipnir-data:/app/data
    restart: on-failure

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092

  db:
    image: postgres:15-alpine
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=huginn
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  sleipnir-data:
