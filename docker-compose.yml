services:
  huginn:
    build:
      context: .
      # Build provenance: stamped into internal/version via -ldflags -X.
      # Override at build time, e.g.
      #   GIT_SHA=$(git rev-parse --short HEAD) docker compose build huginn
      # Unset → graceful "dev"/"unknown" defaults (matches Dockerfile ARGs).
      args:
        VERSION: ${VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "8083:8081"
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - DATABASE_ENABLED=false
      - DATABASE_URL=postgres://postgres:postgres@db:5432/huginn?sslmode=disable
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
    depends_on:
      - redpanda
      - db
    # Conservative privilege hardening (matches norse-stack): the image is a
    # static Go binary, so dropping all caps and blocking privilege escalation
    # is safe. No read_only rootfs — ./data is a writable bind mount.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  dashboard:
    build:
      context: ./web
    ports:
      # Container nginx runs unprivileged and listens on 8080; host surface
      # stays on 8084 (matches HUGINN_DASHBOARD_ORIGIN default).
      - "8084:8080"
    depends_on:
      - huginn
    # nginx runs unprivileged on 8080, so all caps can be dropped safely.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Sleipnir lives in a sibling repo. Opt in with `--profile live`.
  # Without the profile, plain clones come up cleanly without ../sleipnir.
  sleipnir:
    profiles: ["live"]
    build:
      context: ../sleipnir
      dockerfile: Dockerfile
    ports:
      - "8086:8080"
    depends_on:
      - redpanda
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - KAFKA_INTENTS_TOPIC=executions.intents.v1
      - KAFKA_FILLS_TOPIC=executions.fills.v1
      - KAFKA_CONSUMER_GROUP=sleipnir-gateway
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_REST_URL=https://testnet.binance.vision
      - BINANCE_WS_URL=wss://ws-api.testnet.binance.vision/ws-api/v3
      - RATE_LIMIT_RPS=10.0
      - PORT=8080
      - DB_PATH=/app/data/sleipnir.db
    volumes:
      - sleipnir-data:/app/data
    restart: on-failure
    # Static Go binary writing only to its named volume — safe to drop all caps.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092

  db:
    image: postgres:15-alpine
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=huginn
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  sleipnir-data:
