version: '3.8'

services:
  huginn:
    build: .
    ports:
      - "8081:8081"
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - DATABASE_ENABLED=false
      - DATABASE_URL=postgres://postgres:postgres@db:5432/huginn?sslmode=disable
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
    depends_on:
      - redpanda
      - db

  dashboard:
    build:
      context: ./web
    ports:
      - "8080:80"
    depends_on:
      - huginn

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092

  db:
    image: postgres:15-alpine
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=huginn
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
