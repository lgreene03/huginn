name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Verify Dependencies
      run: go mod verify

    - name: Build
      run: go build -v ./...

    - name: Vet
      run: go vet ./...

    - name: Test (race + coverage)
      run: go test -race -coverprofile=cover.out ./...

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
    - name: golangci-lint
      # v9 ships a golangci-lint binary built with Go 1.25, required by our
      # go.mod. v6 shipped v1.64.x (Go 1.24) which rejects Go 1.25 modules.
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    - run: npm ci
    - run: npm run lint
    - run: npm run build
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    - name: Run Playwright smoke tests
      run: npm run test:e2e
