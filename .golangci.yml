# golangci-lint v2 configuration for huginn.
#
# v2 is required because the project's go.mod targets Go 1.25 and the last
# v1 release (1.64.8) was built with Go 1.24 — it refuses to lint modules
# whose `go` directive exceeds its build version.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - errcheck
    - gosec

  settings:
    misspell:
      # "strat" is a deliberate, pervasive abbreviation for "strategy" in this
      # codebase (stratName, the strategy equity curve), NOT a typo of "start".
      ignore-rules:
        - strat
    staticcheck:
      # Disable quick-fix / refactor suggestions (QF*) and style checks (ST*)
      # — these flag formatting and naming preferences, not bugs. SA* (analysis)
      # and S1* (simplifications) checks remain active.
      checks: ["all", "-QF*", "-ST*"]
    revive:
      rules:
        - name: exported
          disabled: true  # docstrings are nice-to-have, not a CI blocker
        - name: var-naming
          disabled: true  # false positives on short names common in Go

  exclusions:
    paths:
      - web/node_modules
    rules:
      - path: "_test\\.go"
        linters:
          - revive
          - gosec
      # G304: file-inclusion-via-variable -- all flagged sites are internal CLI
      # tools or config loaders reading user-supplied local paths, not external
      # input. Suppressing globally is cleaner than sprinkling nolint comments.
      - linters:
          - gosec
        text: "G304" 

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lgreene03/huginn

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
