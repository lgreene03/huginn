# golangci-lint v2 configuration for huginn.
#
# v2 is required because the project's go.mod targets Go 1.25 and the last
# v1 release (1.64.8) was built with Go 1.24 — it refuses to lint modules
# whose `go` directive exceeds its build version.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/lgreene03/huginn

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
