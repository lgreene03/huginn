run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/lgreene03/huginn
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning

issues:
  exclude-rules:
    # Test files are exempt from the exported-symbol doc requirement.
    - path: "_test\\.go"
      linters:
        - revive
  # Don't fail on the first N issues — show the full picture.
  max-issues-per-linter: 0
  max-same-issues: 0
