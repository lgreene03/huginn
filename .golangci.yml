# golangci-lint v2 configuration for huginn.
#
# v2 is required because the project's go.mod targets Go 1.25 and the last
# v1 release (1.64.8) was built with Go 1.24 — it refuses to lint modules
# whose `go` directive exceeds its build version.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    # errcheck disabled: ~25 unchecked Close()/w.Write() across cmd/ and
    # internal/. Re-enable in a dedicated clean-up phase once all defer-close
    # and http.ResponseWriter.Write() paths are audited.
    # - errcheck

  settings:
    staticcheck:
      # Disable quick-fix / refactor suggestions (QF*) and style checks (ST*)
      # — these flag formatting and naming preferences, not bugs. SA* (analysis)
      # and S1* (simplifications) checks remain active.
      checks: ["all", "-QF*", "-ST*"]
    revive:
      rules:
        - name: exported
          disabled: true  # docstrings are nice-to-have, not a CI blocker
        - name: var-naming
          disabled: true  # false positives on short names common in Go

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lgreene03/huginn

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
