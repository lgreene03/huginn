site_name: Huginn
site_description: Quantitative Strategy Execution Engine
site_url: https://lgreene03.github.io/huginn
repo_url: https://github.com/lgreene03/huginn
repo_name: lgreene03/huginn
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Strategies:
      - Overview & Authoring Guide: strategies.md
      - Adding an Alpha: ADDING_AN_ALPHA.md
      - Calibration Workflow: calibration.md
      - Strategy-State Journal Design: STRATEGY_STATE_DESIGN.md
  - Risk Model: risk-model.md
  - Operations Runbook: OPERATIONS.md
  - Benchmarks: BENCHMARKS.md
  - Architecture Decisions:
      - Overview: adr/0001-record-architecture-decisions.md
      - 0002 Pluggable strategy interface: adr/0002-pluggable-strategy-interface.md
      - 0003 Dual-mode executor: adr/0003-dual-mode-paper-live-executor.md
      - 0004 Pre-trade risk & kill switch: adr/0004-pre-trade-risk-model-and-kill-switch.md
      - 0005 Multi-topic fan-in: adr/0005-single-goroutine-dispatch-multi-topic-fanin.md
      - 0006 Dynamic-proto gRPC: adr/0006-dynamic-proto-grpc-without-protoc.md
      - 0007 Walk-forward workflow: adr/0007-walk-forward-calibration-workflow.md
  - Roadmap: ROADMAP.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lgreene03/huginn
