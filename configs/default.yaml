kafka:
  brokers:
    - localhost:9092
  topics:
    - features.obi.v1
  group_id: huginn-paper-trader

strategy:
  name: obi
  threshold: 0.7
  order_size: 0.01

executor:
  transaction_cost_bps: 5.0
  slippage_bps: 2.0

server:
  port: 8081

capital:
  initial_cash: 100000.0

database:
  enabled: false
  url: postgres://postgres:postgres@localhost:5432/huginn?sslmode=disable

