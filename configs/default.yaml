kafka:
  brokers:
    - localhost:9092
  topics:
    - features.obi.v1
  group_id: huginn-paper-trader

strategy:
  name: obi
  threshold: 0.7
  order_size: 0.01

executor:
  transaction_cost_bps: 5.0
  slippage_bps: 2.0

server:
  port: 8081

capital:
  initial_cash: 100000.0

# Postgres is the recommended default. Set DATABASE_ENABLED=false to fall back
# to the JSONL file journal (useful for ephemeral demos and offline backtests).
database:
  enabled: true
  url: postgres://postgres:postgres@localhost:5432/huginn?sslmode=disable
  max_conns: 10
  min_conns: 2
  max_conn_lifetime: 1h
  max_conn_idle_time: 5m

